<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocBox – You're Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F172A;
      font-family: system-ui, -apple-system, sans-serif;
      color: white;
      padding: 2rem;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 3rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #F8FAFC; }
    p { color: #64748B; font-size: 0.9rem; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: white; border: none; padding: 0.875rem 2rem;
      border-radius: 10px; font-size: 0.9375rem;
      font-weight: 600; cursor: pointer; width: 100%;
    }
    button:hover { background: linear-gradient(135deg, #4F46E5, #4338CA); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>No internet connection. Please check your network and try again. If you've used DocBox before, cached documents may be available when you reload.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
