spring.application.name=docbox-backend
server.port=8080

# ============================================
# Database Configuration
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/docbox_db
spring.datasource.username=docbox_user
spring.datasource.password=docbox123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# Add or update this in your backend application.properties
app.share.base-url=http://localhost:5173

# File Storage
app.file-storage.upload-dir=./uploads
app.file-storage.thumbnail-dir=./uploads/thumbnails
app.file-storage.qr-code-dir=./uploads/qr-codes
app.file-storage.max-storage-per-user=5GB

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=your-256-bit-secret-key-change-this-in-production-use-environment-variable
app.jwt.access-token-expiration-ms=1800000
# 30 minutes (1800000ms)
app.jwt.refresh-token-expiration-ms=2592000000
# 30 days (2592000000ms)

# ============================================
# Security Configuration
# ============================================
# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=Authorization,Content-Type
app.cors.allow-credentials=true


# ============================================
# Email Configuration (Gmail SMTP)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-specific-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email Templates
app.email.from=noreply@docbox.com
app.email.support=support@docbox.com


app.ocr.tesseract-data-path=/usr/share/tesseract-ocr/4.00/tessdata
app.ocr.language=eng
app.ocr.min-text-words=10
app.ocr.confidence-threshold=60.0

# ============================================
# Document Processing
# ============================================
# Image Compression
app.image.thumbnail-width=200
app.image.thumbnail-height=200
app.image.compression-quality=0.8

# PDF Processing
app.pdf.max-pages=50
app.pdf.thumbnail-dpi=72

app.validation.min-text-words=3
app.validation.max-file-size=52428800
app.validation.allowed-extensions=pdf,jpg,jpeg,png,heic,webp
# ============================================
# AWS S3 Configuration (Optional)
# ============================================
app.aws.s3.enabled=false
app.aws.s3.bucket-name=docbox-documents
app.aws.s3.region=ap-south-1
app.aws.s3.access-key=your-access-key
app.aws.s3.secret-key=your-secret-key

# ============================================
# Caching Configuration
# ============================================
app.cache.offline-documents-limit=50
app.cache.thumbnail-cache-size=500MB

# ============================================
# Notification Configuration
# ============================================
# Expiry Alerts
app.notification.expiry-alert-90-days=true
app.notification.expiry-alert-30-days=true
app.notification.expiry-alert-7-days=true

# ============================================
# Logging
# ============================================
logging.level.root=INFO
logging.level.com.docbox=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/docbox.log

# ============================================
# Actuator (Monitoring)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ============================================
# Indian Localization
# ============================================
app.localization.timezone=Asia/Kolkata
app.localization.date-format=dd/MM/yyyy
app.localization.currency=INR
app.localization.country-code=+91

# ============================================
# Rate Limiting
# ============================================
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=100
app.rate-limit.requests-per-hour=1000

# ============================================
# Session Management
# ============================================
app.session.max-active-sessions-per-user=5
app.session.cleanup-interval-hours=24


# OCR Settings
app.pdf.ocr-threshold=50
app.pdf.max-ocr-pages=5
app.ocr.render-dpi=300


app.ocr.enabled=false


# Async Processing
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-ocr-




