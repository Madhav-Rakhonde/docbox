# ????????????????????????????????????????????????????????????????????????????
#  DocBox ? application.properties  v3.0
#  All secrets from environment variables. Works on: Local + Docker + Render
# ????????????????????????????????????????????????????????????????????????????

spring.application.name=docbox-backend
server.port=${PORT:8080}

# ????????????????????????????????????????????????????????????????????????????
# DATABASE
# ????????????????????????????????????????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docbox_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:docbox_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:docbox123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.open-in-view=false

# ????????????????????????????????????????????????????????????????????????????
# FILE UPLOAD
# ????????????????????????????????????????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# ????????????????????????????????????????????????????????????????????????????
# JWT
# ????????????????????????????????????????????????????????????????????????????
app.jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-that-is-at-least-64-characters-long-for-hs512-algorithm}
app.jwt.access-token-expiration-ms=1800000
app.jwt.refresh-token-expiration-ms=2592000000

# ????????????????????????????????????????????????????????????????????????????
# CORS
# ????????????????????????????????????????????????????????????????????????????
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,https://docbox-il1u.onrender.com}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=Authorization,Content-Type
app.cors.allow-credentials=true
app.share.base-url=${SHARE_BASE_URL:http://localhost:5173}

# ????????????????????????????????????????????????????????????????????????????
# EMAIL (Gmail SMTP)
# ????????????????????????????????????????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-specific-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.email.from=${MAIL_FROM:noreply@docbox.com}
app.email.support=${MAIL_SUPPORT:support@docbox.com}

# ????????????????????????????????????????????????????????????????????????????
# OCR ? Tesseract
# ????????????????????????????????????????????????????????????????????????????
# TESSDATA_PREFIX is set as ENV in Dockerfile ? works automatically in Docker.
# For local dev override this in application-local.properties.
app.ocr.tesseract-data-path=${TESSDATA_PREFIX:/usr/share/tesseract-ocr/4.00/tessdata}
app.ocr.language=eng
app.ocr.min-text-words=10
app.ocr.confidence-threshold=60.0
app.ocr.enabled=true
app.ocr.render-dpi=300

# ????????????????????????????????????????????????????????????????????????????
# IMAGE PROCESSING
# ????????????????????????????????????????????????????????????????????????????
app.image.thumbnail-width=200
app.image.thumbnail-height=200
app.image.compression-quality=0.8

# ????????????????????????????????????????????????????????????????????????????
# PDF PROCESSING  ? TUNED FOR SPEED
# ????????????????????????????????????????????????????????????????????????????

# How many pages PDFTextStripper reads for native text extraction.
# 10 is more than enough ? government docs are 1?4 pages.
app.pdf.max-pages=10

# DPI for thumbnail generation. 72 DPI = fast. Do NOT increase ? thumbnails
# do not need high resolution and render time scales with DPI squared.
app.pdf.thumbnail-dpi=72

# CHANGED from 5 ? 2: OCR scans only the first 2 pages.
# Every government document we handle has all classification-relevant text
# (aadhaar number, expiry date, issuing authority) on page 1 or 2.
# Pages 3?5 are blank backs, signatures, or fine-print that:
#   a) OCR cannot read reliably
#   b) classification ignores anyway
# Reducing 5 ? 2 cuts OCR time by 60% on multi-page scanned PDFs.
app.pdf.max-ocr-pages=2

# ????????????????????????????????????????????????????????????????????????????
# DOCUMENT VALIDATION
# ????????????????????????????????????????????????????????????????????????????
app.validation.min-text-words=3
app.validation.max-file-size=52428800
app.validation.allowed-extensions=pdf,jpg,jpeg,png,heic,webp

# ????????????????????????????????????????????????????????????????????????????
# NOTIFICATIONS
# ????????????????????????????????????????????????????????????????????????????
app.notification.expiry-alert-90-days=true
app.notification.expiry-alert-30-days=true
app.notification.expiry-alert-7-days=true

# ????????????????????????????????????????????????????????????????????????????
# SESSION
# ????????????????????????????????????????????????????????????????????????????
app.session.max-active-sessions-per-user=5
app.session.cleanup-interval-hours=24

# ????????????????????????????????????????????????????????????????????????????
# RATE LIMITING
# ????????????????????????????????????????????????????????????????????????????
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=100
app.rate-limit.requests-per-hour=1000

# ????????????????????????????????????????????????????????????????????????????
# LOCALIZATION
# ????????????????????????????????????????????????????????????????????????????
app.localization.timezone=Asia/Kolkata
app.localization.date-format=dd/MM/yyyy
app.localization.currency=INR
app.localization.country-code=+91

# ????????????????????????????????????????????????????????????????????????????
# ASYNC PROCESSING  ? INCREASED POOL SIZE
# ????????????????????????????????????????????????????????????????????????????
# CHANGED: core-size 4 ? 6, max-size 8 ? 12
# Reason: OCR now also uses background threads for async processing.
# Increasing the pool prevents OCR threads and notification threads
# from competing for the same 4 slots during concurrent uploads.
spring.task.execution.pool.core-size=6
spring.task.execution.pool.max-size=12
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-

# ????????????????????????????????????????????????????????????????????????????
# CACHING
# ????????????????????????????????????????????????????????????????????????????
app.cache.offline-documents-limit=50
app.cache.thumbnail-cache-size=500MB

# ????????????????????????????????????????????????????????????????????????????
# ACTUATOR (health checks ? Render uses /actuator/health for uptime checks)
# ????????????????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ????????????????????????????????????????????????????????????????????????????
# LOGGING
# ????????????????????????????????????????????????????????????????????????????
logging.level.root=WARN
logging.level.com.docbox=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# No file logging in Docker ? logs go to stdout (Render logs tab)